<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Contact | Gayathri Portfolio</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.contact-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:400px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

input,textarea{

width:100%;
margin:10px 0;
padding:12px;
border-radius:8px;
border:none;

}

button{

background:#06b6d4;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#0891b2;

}

</style>

</head>

<body>

<div class="contact-box">

<h2>Contact Me</h2>

<form action="/contact" method="post">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message" required></textarea>

<button type="submit">

Send Message

</button>

</form>

</div>

</body>

</html>
