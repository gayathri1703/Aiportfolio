<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Admin Login</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{

margin:0;
font-family:Poppins,sans-serif;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#020024,
#090979,
#00d4ff);

}


/* LOGIN BOX */

.login-box{

background:white;

padding:40px 50px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

width:350px;

text-align:center;

}


/* TITLE */

h2{

margin-bottom:25px;

}


/* INPUTS */

input{

width:100%;

padding:12px;

margin-bottom:15px;

border-radius:6px;

border:1px solid #ccc;

font-size:15px;

}


/* BUTTON */

button{

width:100%;

padding:12px;

background:#090979;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#00d4ff;
color:black;

}

</style>

</head>


<body>

<div class="login-box">

<h2>Admin Login</h2>

<form method="post" action="/admin/login">

<input type="text"
name="username"
placeholder="Username"
required>



<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>


</form>

</div>

</body>

</html>
