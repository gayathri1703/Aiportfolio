<!DOCTYPE html>
<html>

<head>

<title>Add Project</title>

<style>

body{

font-family:Poppins;
background:#111827;
color:white;
text-align:center;
padding-top:60px;

}

input,textarea{

width:300px;
padding:10px;
margin:10px;

}

button{

padding:12px 20px;
background:#00d4ff;
border:none;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Add New Project 🚀</h1>

<form action="/admin/add-project" method="post">

<input name="title" placeholder="Project Title">

<br>

<textarea name="description"
placeholder="Description"></textarea>

<br>

<input name="githubLink"
placeholder="Github Link">

<br>

<input name="imageUrl"
placeholder="Image URL">

<br>

<button type="submit">

Save Project

</button>

</form>

</body>

</html>
